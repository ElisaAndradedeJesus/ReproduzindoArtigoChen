name: chen-ddos

topology:
  nodes:
    normal:
      kind: linux
      image: nicolaka/netshoot:latest
      exec:
        - ip addr add 10.0.0.1/24 dev eth1

    attacker:
      kind: linux
      image: nicolaka/netshoot:latest
      exec:
        - ip addr add 10.0.0.3/24 dev eth1

    switch:
      kind: linux
      image: nicolaka/netshoot:latest
      exec:
        - ip link add br0 type bridge
        - ip link set br0 up
        - ip link set eth1 master br0
        - ip link set eth2 master br0
        - ip link set eth3 master br0
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set eth3 up

    victim:
      kind: linux
      image: chen-t3-lab:latest
      exec:
        - ip addr add 10.0.0.2/24 dev eth1
        - ip link set eth1 up
        - iperf3 -s -D

  links:
    - endpoints: ["normal:eth1", "switch:eth1"]
    - endpoints: ["attacker:eth1", "switch:eth2"]
    - endpoints: ["victim:eth1", "switch:eth3"]

